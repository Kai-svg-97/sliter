name: Build

on:
  push:
    branches: [main, feat/sqlite-gui]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
          - os: windows-latest
            label: windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify signing key is present
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set or is empty — bundles will not be signed and auto-update will not work!"
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY is set (length=${#TAURI_SIGNING_PRIVATE_KEY})"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      # ── Branch builds: use tauri-action (no release, just artifact) ──────────
      - name: Build (branch — artifacts only)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts (branch builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: sliter-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

      # ── Tag builds: build directly so signing env vars reach tauri build ──────
      - name: Build Tauri app with signing (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Verify signing produced .sig files (tag)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          echo "=== All bundle files ==="
          find src-tauri/target/release/bundle -type f | sort
          SIG_COUNT=$(find src-tauri/target/release/bundle -name "*.sig" | wc -l)
          echo ""
          echo "Sig files found: $SIG_COUNT"
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "::error::No .sig files created — signing failed! Check TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
            exit 1
          fi

      - name: Publish release from pre-built artifacts (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: sliter ${{ github.ref_name }}
          releaseBody: |
            Cross-platform SQLite GUI — Tauri 2 + React.

            ### Downloads
            | File | Platform |
            |------|----------|
            | `sliter_*_x64-setup.exe` | Windows (NSIS installer) |
            | `sliter_*_x64_en-US.msi` | Windows (MSI) |
            | `sliter_*_amd64.deb` | Ubuntu / Debian |
            | `sliter_*_amd64.AppImage` | Linux (portable) |
          releaseDraft: false
          prerelease: false
          skipBuild: true
